services:
  db:
    image: postgres:15
    container_name: postgres-db
    environment:
      POSTGRES_DB: hapi_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  hapi-fhir:
    image: hapiproject/hapi:latest
    container_name: hapi-fhir-server
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: "jdbc:postgresql://db:5432/hapi_db"
      SPRING_DATASOURCE_USERNAME: "admin"
      SPRING_DATASOURCE_PASSWORD: "password123"
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: "org.postgresql.Driver"
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: "ca.uhn.fhir.jpa.model.dialect.HapiFhirPostgresDialect"
    depends_on:
      - db

  backend:
    build:
      context: ../backend
    container_name: hapi-backend
    ports:
      - "8000:8000"
    env_file:
      - ../backend/.env
    environment:
      - FHIR_BASE_URL=http://hapi-fhir:8080/fhir
      - DATABASE_URL=postgresql://admin:password123@db:5432/hapi_db
      - JWT_SECRET_KEY=local-dev-secret-key
      - PYTHONPATH=/app
    volumes:
      - ../../data/output/fhir:/app/data_files
    depends_on:
      - hapi-fhir
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ../frontend
    container_name: hapi-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
