# fly.toml for HAPI FHIR app on Fly.io
app = "hapi-fhir-app-morning-lake-1316"
primary_region = "iad"

[build]
  # Use the official HAPI FHIR Docker image
  image = "hapiproject/hapi:v7.6.0"

[env]
  # FHIR and security settings
  HAPI_FHIR_FHIR_VERSION = "R4"
  HAPI_FHIR_SECURITY_ENABLED = "false"

  # PostgreSQL connection to Supabase
  SPRING_DATASOURCE_URL = "jdbc:postgresql://db.lrigppqtqfztybxegils.supabase.co:5432/postgres?sslmode=require"
  SPRING_DATASOURCE_USERNAME = "postgres"
  SPRING_DATASOURCE_PASSWORD = "CS6440healt"
  SPRING_DATASOURCE_DRIVER_CLASS_NAME = "org.postgresql.Driver"
  SPRING_JPA_HIBERNATE_DDL_AUTO = "update"
  SPRING_JPA_PROPERTIES_HIBERNATE_JDBC_LOB_NON_CONTEXTUAL_CREATION = "true"

  # HAPI default port
  PORT = "8080"

[[services]]
  protocol = "tcp"
  internal_port = 8080

  [[services.ports]]
    port = 80
    handlers = ["http"]

[[vm]]
  memory = "1gb"
  cpus = 1